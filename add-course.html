 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <h1>Personal Course Organizer</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="my-courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <h2 style="text-align: center;">Add New Course</h2>
        
        <form>
            <p>Course Name:</p>
            <input type="text" placeholder="e.g. Programming">
            
            <p>Instructor Name:</p>
            <input type="text" placeholder="e.g. Dr. Samir">
            
            <p>Credit Hours:</p>
            <input type="number" placeholder="Number of hours">
            
            <p>Notes:</p>
            <textarea rows="4" placeholder="Enter notes here..."></textarea>
            
            <button type="submit">Submit Course</button>
        </form>
    </main>

    <footer>
        <p>All Rights Reserved © 2026 - Designed by Ahmed Tawfik</p>
    </footer>
</body>
</html>
